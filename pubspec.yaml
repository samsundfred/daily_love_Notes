name: daily_love_notes
description: "Daily Love Notes"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  cupertino_icons: ^1.0.8
  http: ^1.1.0   # added for fetching GitHub messages


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/icon.png

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"